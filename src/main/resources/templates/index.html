<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h2>PAGINA DE INICIO</h2>
    <p th:text="${mensaje}"></p>
    <p th:text="${dato}"></p>
    <hr>
    <b>CEDULA:</b><span th:text="${alguien?.cedula}"></span><br>
    <b>CLAVE:</b><span th:text="${alguien?.clave}"></span><br>
    <b>NOMBRE:</b><span th:text="${alguien?.nombre}"></span><br>
    <b>EMAIL:</b><span th:text="${alguien?.email}"></span><br>
    <hr>
    <h4>LISTA DE PERSONAS</h4>
    <hr>
    <div th:if="${users !=null and !#lists.isEmpty(users)}">
        <table border="1">
            <tr>
                <th>ID</th>
                <th>CEDULA</th>
                <th>CLAVE</th>
                <th>NOMBRE</th>
                <th>EMAIL</th>
            </tr>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.cedula}"></td>
                <td th:text="${u.clave}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
            </tr>
        </table>
    </div>
    <div th:if="${users ==null or #lists.isEmpty(users)}">
        La lista de Usuarios esta vacia
    </div>
</body>
</html>
