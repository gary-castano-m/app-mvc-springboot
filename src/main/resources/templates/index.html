<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EJEMPLO DE CRUD MVC CON SPRING BOOT</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>PAGINA DE INICIO</h2>
    <a th:href="@{/agregar}">AGREGAR USUARIO</a>
    <h4>LISTA DE PERSONAS</h4>
    <hr>
    <div th:if="${usuarios !=null and !usuarios.empty}">
        <table border="1">
            <tr>
                <th>ID</th>
                <th>CEDULA</th>
                <th>CLAVE</th>
                <th>NOMBRE</th>
                <th>EMAIL</th>
            </tr>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.cedula}"></td>
                <td th:text="${u.clave}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.email}"></td>
            </tr>
        </table>
    </div>
    <div th:if="${users ==null or #lists.isEmpty(users)}">
        La lista de Usuarios esta vacia
    </div>
</body>
</html>
