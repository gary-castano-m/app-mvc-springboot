<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CRUD MVC ASIGNATURAS CON SPRING BOOT</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="page-subjects">
<header th:replace="~{plantillas/partes :: cabecero}"></header>

<main class="page">
    <section class="page-box">
        <div class="page-header">
            <div>
                <h2>LISTADO DE ASIGNATURAS</h2>
                <p>Gestion de asignaturas registradas</p>
            </div>

            <div class="actions">
                <a class="button secondary" th:href="@{/}">REGRESAR A USUARIOS</a>
                <a class="button" th:href="@{/asignaturas/agregar}">AGREGAR ASIGNATURA</a>
            </div>
        </div>

        <div th:if="${asignaturas !=null and !asignaturas.empty}">
            <div class="table-wrap">
                <table>
                    <tr>
                        <th>ID</th>
                        <th>NOMBRE</th>
                        <th>NOMBRE COMPLETO</th>
                        <th>CARRERA</th>
                        <th>CREDITOS</th>
                        <th>SEMESTRE</th>
                        <th>PROFESOR</th>
                        <th>EDITAR</th>
                        <th>ELIMINAR</th>
                    </tr>
                    <tr th:each="a : ${asignaturas}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.nombre}"></td>
                        <td th:text="${a.nombreCompleto}"></td>
                        <td th:text="${a.carrera}"></td>
                        <td th:text="${a.numeroCreditos}"></td>
                        <td th:text="${a.semestre}"></td>
                        <td th:text="${a.profesor}"></td>
                        <td>
                            <a class="button secondary" th:href="@{/asignaturas/editar/{id}(id=${a.id})}">
                                EDITAR
                            </a>
                        </td>
                        <td>
                            <a class="button danger" th:href="@{/asignaturas/eliminar(id=${a.id})}" th:text="ELIMINAR"></a>
                        </td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="empty-state" th:if="${asignaturas ==null or #lists.isEmpty(asignaturas)}">
            La lista de Asignaturas esta vacia
        </div>
    </section>
</main>

<footer th:replace="~{plantillas/partes :: pie}"></footer>
</body>
</html>
